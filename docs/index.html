<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base href="./">
  <title>Cocos Creator | Backpack_Design</title>

  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <link rel="stylesheet" type="text/css" href="style.css"/>
</head>
<body>
  <div id="GameDiv" cc_exact_fit_screen="false">
    <div id="Cocos3dGameContainer">
      <canvas
        id="GameCanvas"
        width="1280"
        height="720"
        oncontextmenu="event.preventDefault()"
        tabindex="99"
      ></canvas>
    </div>
    <div id="GameLoading" aria-live="polite">
      <div class="loading-title">加载中</div>
      <div class="loading-bar"></div>
      <div class="loading-tip">首次打开需要下载资源，请稍等</div>
    </div>
  </div>
  <script>
    (function () {
      var loading = document.getElementById('GameLoading');
      var tip = loading && loading.querySelector('.loading-tip');
      window.__hideGameLoading = function () {
        if (loading) {
          loading.classList.add('is-hidden');
        }
      };
      window.setTimeout(function () {
        if (loading && !loading.classList.contains('is-hidden') && tip) {
          tip.textContent = '资源仍在加载，GitHub Pages 首次打开会慢一些';
        }
      }, 12000);
    })();
  </script>
  

<!-- Polyfills bundle. -->

<script src="src/polyfills.bundle.js" charset="utf-8"> </script>


<!-- SystemJS support. -->
<script src="src/system.bundle.js" charset="utf-8"> </script>

<!-- Import map -->
<script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

<script>
    System.import('./index.js').catch(function(err) { console.error(err); })
</script>

</body>
</html>
